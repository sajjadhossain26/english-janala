<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Janala</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <!-- Header section -->
    <div class="navbar bg-base-100 shadow-sm bg-blue-100">
      <div class="wrap w-10/12 m-auto flex">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li><a>Item 1</a></li>
              <li>
                <a>Parent</a>
                <ul class="p-2">
                  <li><a>Submenu 1</a></li>
                  <li><a>Submenu 2</a></li>
                </ul>
              </li>
              <li><a>Item 3</a></li>
            </ul>
          </div>
          <div class="logo flex items-center font-bold text-xl sm:text-md">
            <span>English</span>
            <img src="./assets/logo.png" alt="" />
            <span class="bangla-font">জানালা </span>
          </div>
        </div>

        <div class="navbar-end space-x-2">
          <a class="btn btn-primary btn-outline sm:text-sm"
            ><i class="fa-solid fa-circle-question"></i> FAQ</a
          >
          <a class="btn btn-primary btn-outline sm:text-sm"
            ><i class="fa-solid fa-book-open"></i> LEARN</a
          >
          <a class="btn btn-primary btn-outline"
            ><i class="fa-solid fa-arrow-right-from-bracket"></i> LOGOUT</a
          >
        </div>
      </div>
    </div>

    <!-- Hero Section  -->
    <section class="hero-section">
      <div
        class="hero-wrap flex items-center pt-[60px] w-10/12 m-auto h-[50vh] justify-evenly flex-col flex-col-reverse md:flex-row mx-auto py-5"
      >
        <div class="left w-[500px]">
          <h1 class="text-4xl font-bold mb-5">
            <span class="text-primary">English</span> is Easy!
          </h1>
          <p class="bangla-font mb-4">
            আজ থেকেই আপনার জাভা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
            আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে
            যাবে অন্য একটি Level এ
          </p>

          <fieldset class="fieldset">
            <input type="text" class="input" placeholder="Enter Your Name" />
            <input type="password" class="input" placeholder="Password" />
            <button class="btn btn-primary w-[160px]">Get Started</button>
          </fieldset>
        </div>
        <div class="right w-[600px]">
          <img class="" src="./assets/hero-student.png" alt="" />
        </div>
      </div>
    </section>

    <!-- Learn section -->
    <section class="learn mt-[40px] mt-[550px] md:mt-[30px]">
      <div class="learn-wrap w-10/12 mx-auto text-center">
        <h1 class="text-4xl font-bold mb-5">
          <span class="text-primary">Let's</span> Learn Vocabularies
        </h1>

        <div
          id="learn-container"
          class="flex gap-2 box-border box-content flex-wrap m-auto text-center justify-center"
        ></div>
        <div
          id="card-details"
          class="card-data bg-slate-100 grid grid-cols-4 gap-5 my-[50px] p-[50px] rounded-md"
        ></div>
      </div>
    </section>
  </body>

  <script src="./script.js"></script>
</html>
